events {
    worker_connections 1024;
}

http {
    # Resolver DNS interno de Docker para descubrir el upstream dinámicamente
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        # Reenvía todas las peticiones /api/ al microservicio de reservas
        # El header Authorization se preserva sin modificarlo
        location /api/ {
            set $bookings_upstream svc-bookings:8080;
            proxy_pass http://$bookings_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Preservar el token JWT enviado por el cliente
            proxy_set_header Authorization $http_authorization;
            proxy_pass_header Authorization;
        }
    }
}
