services:

  # Base de datos de Keycloak (Authorization Server)
  postgres-keycloak:
    image: postgres:13
    container_name: gym-postgres-keycloak
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres-keycloak
    ports:
      - "5435:5432"
    volumes:
      - postgres-keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres-keycloak"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gym-net

  # Keycloak - realm gym-system importado automáticamente
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    container_name: gym-keycloak
    command: start-dev --import-realm --http-port=8080
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/postgres-keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: localhost
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8280:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - gym-net

  # Base de datos del microservicio de reservas
  postgres-bookings:
    image: postgres:16-alpine
    container_name: gym-postgres-bookings
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookings_db
    ports:
      - "5436:5432"
    volumes:
      - postgres-bookings_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookings_db"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gym-net

  # Microservicio Spring Boot - reservas de clases
  svc-bookings:
    build:
      context: ./svc-bookings
      dockerfile: Dockerfile
    image: gym-bookings-service:0.0.1
    container_name: gym-svc-bookings
    ports:
      - "8281:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-bookings:5432/bookings_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      # issuer-uri usa localhost (claim iss del token)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8280/realms/gym-system
      # jwk-set-uri usa DNS interno de Docker para obtener certificados
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/gym-system/protocol/openid-connect/certs
    depends_on:
      postgres-bookings:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - gym-net

  # Gateway Nginx (bono Parte D) - reenvía /api/ y preserva Authorization
  nginx-gateway:
    image: nginx:alpine
    container_name: gym-nginx-gateway
    ports:
      - "8088:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - svc-bookings
    networks:
      - gym-net

volumes:
  postgres-keycloak_data:
  keycloak_data:
  postgres-bookings_data:

networks:
  gym-net:
    driver: bridge
